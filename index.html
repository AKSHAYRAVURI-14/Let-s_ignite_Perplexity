<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoot AI - Your Premium Assistant</title>
    <!-- Ethnic luxurious fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder for a premium feel (optional but good) -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-ghost"></i>
                <span>Bhoot AI</span>
            </div>
            <nav>
                <div class="nav-item active" id="btn-new-chat"><i class="fas fa-plus"></i> New Chat</div>
                <!-- Future features -->
                <div class="nav-item" id="btn-history"><i class="fas fa-history"></i> History</div>
                <div id="history-list" class="hidden" style="display: flex; flex-direction: column; gap: 5px; margin-left: 20px; margin-bottom: 10px; font-size: 13px; max-height: 200px; overflow-y: auto; color: #aaa;"></div>
                <div class="nav-item"><i class="fas fa-cog"></i> Settings</div>
            </nav>
        </aside>

        <main class="chat-wrapper">
            <header class="top-nav">
                <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="status-badge">PRIME</div>
                <div class="user-avatar">A</div>
            </header>

            <div class="welcome-container" id="welcome-screen">
                <h1 class="greeting">Hey Champ!, star of the night, <br><span>What brilliant ideas shall we ignite?</span></h1>
                
                <div class="input-area">
                    <div id="file-preview-container" class="hidden" style="padding: 10px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px;">
                        <img id="file-preview-image" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;">
                        <span id="file-preview-name" style="font-size: 12px; color: #ddd;"></span>
                        <button id="remove-file-btn" style="background: none; border: none; color: #ff6b6b; cursor: pointer; margin-left: auto;"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="search-bar-container">
                        <textarea id="user-input" placeholder="Ask Bhoot AI..." rows="1"></textarea>
                        <div class="actions">
                            <input type="file" id="file-upload" accept="image/*,.pdf,.docx" style="display: none;">
                            <button id="upload-btn" title="Upload file"><i class="fas fa-paperclip"></i></button>
                            <button id="mic-btn" title="Use microphone"><i class="fas fa-microphone"></i></button>
                            <button id="send-btn" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                        </div>
                    </div>
                </div>

                <div class="suggestion-chips">
                    <button class="chip"><i class="fas fa-image"></i> Create image</button>
                    <button class="chip"><i class="fas fa-cricket-ball"></i> Follow IPL</button>
                    <button class="chip"><i class="fas fa-music"></i> Create music</button>
                    <button class="chip"><i class="fas fa-rocket"></i> Boost my day</button>
                </div>
            </div>

            <!-- This container will hold the actual conversation -->
            <div id="chat-history" class="chat-history hidden"></div>
        </main>
    </div>

    <!-- Loading animation -->
    <div id="loader" class="loader hidden">
        <div class="pulse"></div>
    </div>

    <!-- Import marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
